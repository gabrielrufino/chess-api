<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Chess API interactive demo — play chess against another browser tab via the Chess API." />
  <title>Chess API - Demo</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FWXW9K93KH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-FWXW9K93KH');
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- jQuery (required by chessboard.js) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- chessboard.js — must remain a classic script (uses global Chessboard) -->
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- App (ESM module — chess.js v1 is imported inside app.js) -->
  <script type="module" src="app.js"></script>
</head>

<body>

  <header>
    <h1>♟ Chess API - Demo</h1>
    <p>
      Real-time chess powered by the Chess API<br>
      <a id="api-docs-link" href="#" target="_blank" aria-label="API Documentation"
        style="color: var(--accent); text-decoration: none; font-size: 0.9rem; margin-top: 6px; display: inline-block; font-weight: 500;">
        View Swagger Docs
      </a>
    </p>
  </header>

  <!-- ───── Setup screen ───── -->
  <div id="setup-screen" class="card">
    <div class="field">
      <label for="guest-name">Your name</label>
      <input id="guest-name" type="text" placeholder="Guest-..." autocomplete="off" />
    </div>
    <div class="field">
      <label for="duration">Game duration</label>
      <select id="duration">
        <option value="">Loading modes...</option>
      </select>
    </div>
    <button id="join-btn" class="btn btn-primary">Enter game</button>
    <div id="setup-error" style="margin-top:14px;color:var(--red);font-size:0.85rem;text-align:center;display:none;">
    </div>
  </div>

  <!-- ───── Game screen ───── -->
  <div id="game-screen">
    <div class="game-layout">

      <!-- Board column -->
      <div class="board-col">
        <div class="player-info">
          <div class="player-badge">
            <span class="color-dot" id="my-color-dot"></span>
            <span id="my-name-label">—</span>
          </div>
          <span id="turn-indicator" style="font-size:0.82rem;color:var(--text-muted);"></span>
        </div>
        <div id="board-container">
          <div id="board"></div>
        </div>
      </div>

      <!-- Side panel -->
      <div class="side-col">
        <div id="status-bar">
          <span class="spinner"></span>
          <span id="status-text">Connecting…</span>
        </div>

        <div class="side-card clocks-card" id="clocks-container" style="display:none; margin-bottom: 1rem;">
          <h3>Clocks</h3>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div style="font-size: 0.9rem; color: var(--text-muted); display:flex; align-items:center; gap: 8px;">
              <div style="width:12px; height:12px; background: white; border:1px solid #ccc; border-radius:50%;"></div>
              White
            </div>
            <div id="white-clock" style="font-size: 1.5rem; font-weight: bold; font-family: monospace;">--:--</div>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div style="font-size: 0.9rem; color: var(--text-muted); display:flex; align-items:center; gap: 8px;">
              <div style="width:12px; height:12px; background: black; border:1px solid #ccc; border-radius:50%;"></div>
              Black
            </div>
            <div id="black-clock" style="font-size: 1.5rem; font-weight: bold; font-family: monospace;">--:--</div>
          </div>
          <button id="claim-timeout-btn" class="btn btn-primary" style="width:100%; display:none;">Claim
            Timeout</button>
        </div>

        <div class="side-card">
          <h3>Move history</h3>
          <div id="moves-log"></div>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <p>
      <a href="https://github.com/gabrielrufino/chess-api" target="_blank" aria-label="View on GitHub"
        style="display:inline-flex; align-items:center; color: inherit;">
        <svg height="24" width="24" viewBox="0 0 16 16" fill="currentColor">
          <path
            d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.46-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z">
          </path>
        </svg>
      </a>
    </p>
    <p style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-muted);">
      Powered by <a href="http://gabrielrufino.com" target="_blank" style="color: inherit; font-weight: 500;">Gabriel
        Rufino</a>
    </p>
  </footer>

</body>

</html>
